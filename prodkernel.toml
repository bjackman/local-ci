resources = ["kbs"]
num_worktrees = 8

[[tests]]
name = "gbuild2-remote-dbg"
resources = ["kbs"]
command = ["bash", "-c", "gbuild2 --remote --noneed_local_outputs --commit=$LCI_COMMIT GTESTS=1 CONFIG=dbg"]

[[tests]]
name = "gbuild2-remote-kdump"
resources = ["kbs"]
command = ["bash", "-c", "gbuild2 --remote --noneed_local_outputs --commit=$LCI_COMMIT CONFIG=kdump"]

