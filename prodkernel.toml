[[tests]]
name = "kunit-qemu"
command = ["bash", "-x", "-c", """
make -j mrproper
tools/testing/kunit/kunit.py run --arch=x86_64 --timeout=10 \
    --jobs=`nproc --all` --kunitconfig=arch/x86/mm/.kunitconfig --qemu_args "-smp 2" \
    --make_options "LLVM=1" --make_options "CC=ccache clang" --kernel_args asi=on
"""]
